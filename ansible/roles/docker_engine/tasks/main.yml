---
# tasks file for docker_engine
# Install and configure Docker securely

- name: 1. Ensure essential packages are installed
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: yes
  become: true

- name: 2. Add Docker’s official GPG key
  ansible.builtin.shell: |
    install -m 0755 -d /etc/apt/keyrings
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
    chmod a+r /etc/apt/keyrings/docker.asc
  args:
    creates: /etc/apt/keyrings/docker.asc
  become: true

- name: 3. Add official Docker APT repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/docker.list
    content: |
      deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release | lower }} stable
  become: true

- name: 4. Force apt cache update after adding Docker repo
  ansible.builtin.apt:
    update_cache: yes
  become: true

- name: 5. Install Docker Engine and dependencies
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
  become: true

- name: 6. Ensure docker group exists
  ansible.builtin.group:
    name: docker
    state: present
  become: true

- name: 7. Add allowed users to docker group
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ docker_users }}"
  become: true

- name: 8. Create secure Docker daemon configuration
  ansible.builtin.template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    mode: '0644'
  notify: Restart docker
  become: true

- name: 9. Enable and start Docker service
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true
  become: true

- name: 10. Verify Docker installation
  ansible.builtin.command: docker info
  register: docker_info
  changed_when: false
  failed_when: docker_info.rc != 0
  become: true

- debug:
    msg: "{{ docker_info.stdout_lines }}"

