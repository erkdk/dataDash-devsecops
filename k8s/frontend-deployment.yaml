apiVersion: apps/v1
kind: Deployment
metadata:
  name: datadash-frontend
  namespace: datadash
spec:
  replicas: 2
  selector:
    matchLabels:
      app: datadash-frontend
  template:
    metadata:
      labels:
        app: datadash-frontend
    spec:
      containers:
      - name: datadash-frontend
        image: registry.local/datadash/frontend:latest
        ports:
        - containerPort: 3000
        env:
        - name: REACT_APP_API_URL
          value: "http://datadash-backend.datadash.svc.cluster.local:5000"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
