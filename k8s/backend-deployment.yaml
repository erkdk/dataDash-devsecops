apiVersion: apps/v1
kind: Deployment
metadata:
  name: datadash-backend
  namespace: datadash
spec:
  replicas: 2
  selector:
    matchLabels:
      app: datadash-backend
  template:
    metadata:
      labels:
        app: datadash-backend
    spec:
      containers:
      - name: datadash-backend
        image: registry.local/datadash/backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        env:
        - name: NODE_ENV
          value: "production"
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: datadash-secrets
              key: mongodb-uri
        - name: PORT
          value: "5000"
        - name: HOST        
          value: "0.0.0.0"  
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 45  
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10  
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
