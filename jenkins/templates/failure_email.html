<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            border: 1px solid #e0e0e0;
            padding: 20px;
            border-radius: 8px;
        }
        h2 {
            margin-top: 0;
            font-size: 24px;
        }
        b {
            font-weight: bold;
            display: inline-block;
            width: 80px;
        }
        hr {
            border: none;
            border-top: 1px solid #eee;
            margin: 20px 0;
        }
        .cta {
            font-size: 14px;
            color: #555;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .footer {
            font-size: 11px;
            color: #777;
            text-align: center;
            margin-top: 15px;
        }
        a {
            color: #cc0000;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="container">
    <h2 style="color:red;">Build Failed!</h2>
    <p>
        <b>Project:</b> ${JOB_NAME}<br>
        <b>Build #:</b> ${BUILD_NUMBER}<br>
        <b>Status:</b> FAILURE<br>
        <b>Branch:</b> ${GIT_BRANCH}<br>
        <b>Duration:</b> ${BUILD_DURATION}<br>
        <b>Build URL:</b> <a href="${BUILD_URL}" style="color:red; text-decoration: underline;">${BUILD_URL}</a>
    </p>
    <hr>
    <!-- Call to Action -->
    <p class="cta">
        Please review the logs and fix the issue immediately.<br>
        <a href="${BUILD_URL}console" style="color:red;">View Console Output</a>
    </p>
    <p class="footer">dataDash | Managed by the DevOps Team</p>
</div>
</body>
</html>
